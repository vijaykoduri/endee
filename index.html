<!doctype html>
<html>
<head>
    <title>RAG Query System</title>
</head>
<body>
    <h2>Upload Documents (multiple allowed)</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="files" multiple required>
        <button type="submit">Upload</button>
    </form>

    {% if message %}
    <p><strong>{{ message }}</strong></p>
    {% endif %}

    <h2>Ask Questions (one per line):</h2>
    <form action="{{ url_for('query') }}" method="post">
        <textarea name="questions" rows="5" cols="60" placeholder="Enter one question per line" required></textarea><br>
        <button type="submit">Submit</button>
    </form>

    {% if answer %}
    <h3>Answers:</h3>
    <pre>{{ answer }}</pre>
    {% endif %}
</body>
</html>
